<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">🚀 Ryan's Personal Development Space</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Contact Me</h1>
        <p>Have a question or want to work together? Drop me a line below!</p>
        
        <form action="/contact" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="visitor_name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="visitor_message" rows="4" placeholder="Hey Ryan..." required></textarea>
            </div>

            <button type="submit" class="btn-primary">Send Message →</button>
        </form>

        <a href="/" class="btn-primary" style="margin-top: 20px; background-color: #64748b;">← Back to Home</a>
    </div>

</body>
</html>
